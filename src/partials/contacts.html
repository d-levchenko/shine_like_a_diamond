<section class="contacts-section">
  <div class="container">
    <h3 class="section-subtitle">Connect</h3>
    <h2 class="section-title">Order your unique jewelry</h2>
    <p class="section-paragraph">We'd love to hear more details from you!</p>
    <div class="contacts-wrapper">
      <div class="address-wrapper">
        <address>
          <ul class="contacts-list">
            <li class="contact-item">
              <svg class="contacts-svg" width="32" height="32">
                <use href="../images/sprite.svg#icon-envelope"></use>
              </svg>
              <span class="contact-label">Email</span>
              <a
                class="contact-link"
                href="mailto:info@handmadejewelry.com"
                rel="noopener noreferer"
                >info@handmadejewelry.com</a
              >
            </li>

            <li class="contact-item">
              <svg class="contacts-svg" width="32" height="32">
                <use href="../images/sprite.svg#icon-phone"></use>
              </svg>
              <span class="contact-label">Phone</span>
              <a
                class="contact-link"
                href="tel:+15550000000"
                rel="noopener noreferer"
                >+1 (555) 000-0000</a
              >
            </li>

            <li class="contact-item">
              <svg class="contacts-svg" width="32" height="32">
                <use href="../images/sprite.svg#icon-map"></use>
              </svg>
              <span class="contact-label">Office</span>
              <a
                class="contact-link"
                href="https://maps.app.goo.gl/D5tV2LWRM2f5fymj7"
                target="_blank"
                rel="noopener noreferer"
                >76-8 Oakington Manor Dr, London, UK</a
              >
            </li>
          </ul>
        </address>
      </div>
      <div class="form-wrapper">
        <form class="contact-form">
          <div class="contact-form-field-wrapper">
            <label class="contact-form-field-label" for="user-name"
              >Name*</label
            >
            <input
              class="contact-form-field-input"
              id="user-name"
              type="text"
              name="user-name"
              placeholder="Tony"
              pattern="^[a-zA-Z\s\.]{5,28}$"
              required
            />
          </div>
          <div class="contact-form-field-wrapper">
            <label class="contact-form-field-label" for="user-tel"
              >Phone*</label
            >
            <input
              class="contact-form-field-input"
              id="user-tel"
              type="tel"
              name="user-tel"
              placeholder="+1 234 123 23"
              pattern="^\+[0-9\s]{14}$"
              required
            />
          </div>
          <div class="contact-form-field-wrapper">
            <label class="contact-form-field-label" for="user-message"
              >Describe what you want</label
            >
            <textarea
              class="form-field-message"
              name="user-message"
              id="user-message"
              placeholder="Type your message..."
              maxlength="500"
              required
            ></textarea>
          </div>
          <button class="submit-form-button" type="submit">Submit</button>
        </form>
      </div>
    </div>
  </div>
</section>
